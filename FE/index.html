<html>
  <head>
    <title>학생 정보/ 성적 관리 페이지</title>
        
    <!-- CSS 파일들 -->
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <section class="sectionWrap">
      <article class="searchWrap">
        <div>
          <button  onclick="createHiddenInput()">CSV 파일 업로드</button>
        </div> 
        <form  onsubmit="event.preventDefault(); getStudentsList()">
          <ul  class="searchSecWrap">
            <li>
              <select required id="grade" name="grade" placeholder="학년">
                <option value="" disabled selected hidden>
                  학년
                </option>
                <option value="0">전체</option>
                <option value="1">1학년</option>
                <option value="2">2학년</option>
                <option value="3">3학년</option>
              </select>
            </li>
            <li>
              <select required name="semester" id="semester" placeholder="학기">
                <option value="" disabled selected hidden>
                  학기
                </option>
                <option value="0">전체</option>
                <option value="1">1학기</option>
                <option value="2">2학기</option>
              </select>
            </li>
            <li>
              <select required name="examType" id="examType" placeholder="중간/기말">
                <option value="" disabled selected hidden>
                  중간/기말
                </option>
                <option value="0">전체</option>
                <option value="MID">중간</option>
                <option value="FIN">기말</option>
              </select>
            </li>
            <li>
              <select required name="classNumber" id="classNumber" placeholder="반">
                <option value="" disabled selected hidden>
                  반
                </option>
                <option value="0">전체</option>
                <option value="1">1반</option>
                <option value="2">2반</option>
                <option value="3">3반</option>
                <option value="4">4반</option>
                <option value="5">5반</option>
              </select>
            </li>
            <li style="display:none">
              <select  name="schoolGrade" id="schoolGrade" placeholder="내신 등급">
                <option value="" disabled selected hidden>
                  내신 등급
                </option>
                <option value="0">전체</option>
              </select>
            </li>
            <li>
              <button type="submit">검색</button>
            </li>
          </ul>
        </form>
      </article>
      <article>
        <ul class="editArea">
          <li>
            <input disabled id="studentId" type="text"  placeholder="학번">
          </li>
          <li>
            <input disabled id="studentName" type="text"  placeholder="이름">
          </li>
          <li>
            <input disabled id="semester_i" type="text"  placeholder="학기 구분">
          </li>
          <li>
            <input disabled id="examType_i" type="text"  placeholder="중간/기말">
          </li>
          <li>
            <input  id="koreanScore" type="text" required placeholder="국어">
          </li>
          <li>
            <input  id="mathScore" type="text" required placeholder="수학">
          </li>
          <li>
            <input  id="englishScore" type="text" required placeholder="영어">
          </li>
          <li>
            <button onclick="editStdScore()">수정</button>
          </li>
          <li>
            <button onclick="delStd()">삭제</button>
          </li>
        </ul>
      </article>
      <article>
        <div class="table-wrapper">
          <table>
            <colgroup> 
              <col style="width: 5%;">   
              <col style="width: 5%;">   
              <col style="width: 8%;">   
              <col style="width: 7%;">   
              <col style="width: 6%;">   
              <col style="width: 6%;">   
              <col style="width: 6%;">   
              <col style="width: 6%;">   
              <col style="width: 5%;">   
              <col style="width: 5%;">   
              <col style="width: 5%;">   
              <col style="width: 6%;">   
              <col style="width: 10%;">  
              <col style="width: 10%;">
            </colgroup>
            <thead>
              <tr id="theadSec">
                <th>학년</th>
                <th>반</th>
                <th>학번</th>
                <th>이름</th>
                <th>학기</th>
                <th>시험 종류</th>
                <th>전교등수</th>
                <th>반등수</th>
                <th>국어</th>
                <th>수학</th>
                <th>영어</th>
                <th>평균</th>
                <th>등록일</th>
                <th>수정일</th>
              </tr>
            </thead>
            <tbody id="tbodySec">
              <tr class="table-info-row">
                <td colspan="14" style="text-align: center; padding: 4rem 0; color: #666; height: 100%;">
                  <div style="font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: bold;">🔍 조회 조건을 선택해 주세요</div>
                  <p style="font-size: 1rem; color: #999; margin: 0;">학년, 학기 등 조건을 선택한 후 검색 버튼을 누르면 학생 성적 목록이 표시됩니다.</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </article>
    </section>
    <!-- JS 파일 -->
    <script src="./script/getDropdown.js" ></script>
    <script src="./script/uploadCsv.js" ></script>
    <script src="./script/getStudents.js" ></script>
    <script src="./script/editStudent.js" ></script>
  </body>
</html>
